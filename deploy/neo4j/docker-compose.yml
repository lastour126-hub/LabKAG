services:
  neo4j:
    image: neo4j:latest
    container_name: ${NEO4J_CONTAINER_NAME:-labkag-neo4j}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-labkagneo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INIT:-1G}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-4G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-1G}
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: "*"
      NEO4J_dbms_security_procedures_allowlist: "*"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - labkag_neo4j_data:/data
      - labkag_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  labkag_neo4j_data:
  labkag_neo4j_logs:
